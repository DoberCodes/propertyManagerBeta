name: Mirror branch to external repository

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.MIRROR_REPOSITORY_NAME }}" ]; then
            echo "Missing required secret: MIRROR_REPOSITORY_NAME (format: repo-name)"
            exit 1
          fi
          if [ -z "${{ secrets.MIRROR_TOKEN }}" ]; then
            echo "Missing required secret: MIRROR_TOKEN"
            exit 1
          fi

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push branch to mirror repository
        env:
          MIRROR_OWNER: ${{ github.repository_owner }}
          MIRROR_REPOSITORY_NAME: ${{ secrets.MIRROR_REPOSITORY_NAME }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote add mirror "https://x-access-token:${MIRROR_TOKEN}@github.com/${MIRROR_OWNER}/${MIRROR_REPOSITORY_NAME}.git"
          git push mirror "refs/heads/${SOURCE_BRANCH}:refs/heads/${SOURCE_BRANCH}" --force
